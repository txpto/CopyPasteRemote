name: Semgrep SAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1"      # lunes 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep CE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep          # pinear a la misma versión que en local

      - name: Run Semgrep (1 sola pasada)
        run: |
          semgrep scan \
            --metrics=off \
            --disable-version-check \
            --config p/python \
            --config p/secrets \
            --config p/sql-injection \
            --config p/owasp-top-ten \
            --exclude tests \
            --exclude iec870ree \
            --sarif-output semgrep.sarif \
            --json-output semgrep.json \
            src/ | tee semgrep.txt || true

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep.sarif
            semgrep.json
            semgrep.txt
          retention-days: 30

      - name: Gate (falla solo si hay severidad ERROR)
        if: always()
        run: |
          errs=$(jq '[.results[] | select(.extra.severity=="ERROR")] | length' semgrep.json)
          echo "Hallazgos ERROR: $errs"
          test "$errs" -eq 0
